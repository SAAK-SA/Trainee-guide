<!-- ============ 3. LOCATION ============ -->

<section id="agreement" class="section">

      <p class="agreement-text" data-i18n="agreement.text"></p>

      <div class="form-grid">
        <div class="form-field">
          <label for="f-name" data-i18n="agreement.fullName"></label>
          <input type="text" id="f-name" name="fullName" required>
        </div>
        <div class="form-field">
          <label for="f-company" data-i18n="agreement.companyName"></label>
          <input type="text" id="f-company" name="companyName" required>
        </div>
        <div class="form-field">
          <label for="f-course" data-i18n="agreement.courseName"></label>
          <input type="text" id="f-course" name="courseName" required>
        </div>
        <div class="form-field">
          <label for="f-date" data-i18n="agreement.trainingDate"></label>
          <input type="date" id="f-date" name="trainingDate" required>
        </div>
      </div>

      <div class="signature-field">
        <label data-i18n="agreement.signature"></label>
        <canvas id="signature-pad" width="600" height="180"></canvas>
        <button type="button" id="signature-clear" class="btn btn-text" data-i18n="agreement.clearSignature"></button>
      </div>

      <label class="checkbox-field">
        <input type="checkbox" id="f-agree" required>
        <span data-i18n="agreement.checkbox"></span>
      </label>

      <button type="submit" class="btn btn-accent btn-lg">
        <span data-i18n="agreement.submit"></span>
        <svg width="18" height="18"><use href="#icon-check"/></svg>
      </button>
    </form>

    <div id="agreement-success" class="agreement-success" hidden>
      <div class="success-check"><svg width="48" height="48"><use href="#icon-check"/></svg></div>
      <h3 data-i18n="agreement.successTitle"></h3>

    </div>
  </div>
</section>
